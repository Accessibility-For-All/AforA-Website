<svg width="800" height="580" viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="vpBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f8f9fa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="580" fill="url(#vpBg)"/>

  <!-- ACR document -->
  <rect x="48" y="34" width="430" height="512" rx="10" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="48" y="34" width="430" height="96" rx="10" fill="#2b386b"/>
  <rect x="48" y="110" width="430" height="20" fill="#2b386b"/>
  <text x="74" y="72" font-size="12" fill="#aeb8d6" font-weight="700" letter-spacing="1.5">ACCESSIBILITY CONFORMANCE REPORT</text>
  <text x="74" y="100" font-size="22" fill="#ffffff" font-weight="800">VPAT® 2.5 — WCAG 2.1</text>
  <text x="74" y="120" font-size="11.5" fill="#aeb8d6">Acme Analytics Platform v4.2 · Edition: INT</text>

  <!-- table header -->
  <text x="74" y="166" font-size="13" fill="#2c2c2c" font-weight="700">Table 1: Success Criteria, Level A &amp; AA</text>
  <rect x="74" y="178" width="378" height="30" fill="#f4f0ea"/>
  <text x="86" y="198" font-size="11" fill="#5b6472" font-weight="700">Criteria</text>
  <text x="300" y="198" font-size="11" fill="#5b6472" font-weight="700">Conformance Level</text>

  <!-- rows -->
  <g font-size="11.5">
    <text x="86" y="232" fill="#2c2c2c">1.1.1 Non-text Content</text>
    <rect x="300" y="220" width="140" height="18" rx="9" fill="#eef7f1"/><circle cx="312" cy="229" r="4" fill="#2f9e6b"/><text x="322" y="233" fill="#2f9e6b" font-weight="600">Supports</text>

    <text x="86" y="262" fill="#2c2c2c">1.3.1 Info &amp; Relationships</text>
    <rect x="300" y="250" width="140" height="18" rx="9" fill="#eef7f1"/><circle cx="312" cy="259" r="4" fill="#2f9e6b"/><text x="322" y="263" fill="#2f9e6b" font-weight="600">Supports</text>

    <text x="86" y="292" fill="#2c2c2c">1.4.3 Contrast (Minimum)</text>
    <rect x="300" y="280" width="150" height="18" rx="9" fill="#fdf8ee"/><circle cx="312" cy="289" r="4" fill="#e0a82e"/><text x="322" y="293" fill="#b07e10" font-weight="600">Partially Supports</text>

    <text x="86" y="322" fill="#2c2c2c">2.1.1 Keyboard</text>
    <rect x="300" y="310" width="140" height="18" rx="9" fill="#eef7f1"/><circle cx="312" cy="319" r="4" fill="#2f9e6b"/><text x="322" y="323" fill="#2f9e6b" font-weight="600">Supports</text>

    <text x="86" y="352" fill="#2c2c2c">2.4.7 Focus Visible</text>
    <rect x="300" y="340" width="150" height="18" rx="9" fill="#fdf8ee"/><circle cx="312" cy="349" r="4" fill="#e0a82e"/><text x="322" y="353" fill="#b07e10" font-weight="600">Partially Supports</text>

    <text x="86" y="382" fill="#2c2c2c">3.3.2 Labels or Instructions</text>
    <rect x="300" y="370" width="140" height="18" rx="9" fill="#eef7f1"/><circle cx="312" cy="379" r="4" fill="#2f9e6b"/><text x="322" y="383" fill="#2f9e6b" font-weight="600">Supports</text>

    <text x="86" y="412" fill="#2c2c2c">4.1.2 Name, Role, Value</text>
    <rect x="300" y="400" width="140" height="18" rx="9" fill="#eef7f1"/><circle cx="312" cy="409" r="4" fill="#2f9e6b"/><text x="322" y="413" fill="#2f9e6b" font-weight="600">Supports</text>
  </g>
  <line x1="74" y1="428" x2="452" y2="428" stroke="#e5e5e5"/>
  <text x="74" y="452" font-size="11" fill="#9aa0a8">Evaluated against WCAG 2.1 AA &amp; EN 301 549</text>

  <!-- stamp -->
  <g transform="translate(360,478)">
    <circle r="40" fill="none" stroke="#2f9e6b" stroke-width="3"/>
    <text x="0" y="-4" font-size="11" fill="#2f9e6b" text-anchor="middle" font-weight="800">VERIFIED</text>
    <text x="0" y="12" font-size="9" fill="#2f9e6b" text-anchor="middle">ACR · 2026</text>
  </g>
  <text x="74" y="488" font-size="12" fill="#2c2c2c" font-weight="700">Conformance: 47 / 50</text>
  <text x="74" y="508" font-size="11" fill="#5b6472">criteria fully supported</text>

  <!-- Right column: two-step process -->
  <text x="508" y="62" font-size="16" fill="#2c2c2c" font-weight="800">Two-Step Audit Process</text>

  <rect x="508" y="80" width="252" height="120" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <circle cx="536" cy="112" r="16" fill="#d4a574"/><text x="536" y="117" font-size="14" fill="#fff" text-anchor="middle" font-weight="800">1</text>
  <text x="564" y="110" font-size="14" fill="#2c2c2c" font-weight="700">Manual Audit</text>
  <text x="564" y="132" font-size="11.5" fill="#5b6472">Certified engineer evaluates</text>
  <text x="564" y="148" font-size="11.5" fill="#5b6472">and documents every issue</text>
  <text x="564" y="164" font-size="11.5" fill="#5b6472">against WCAG / EN 301 549.</text>

  <rect x="508" y="216" width="252" height="120" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <circle cx="536" cy="248" r="16" fill="#2b386b"/><text x="536" y="253" font-size="14" fill="#fff" text-anchor="middle" font-weight="800">2</text>
  <text x="564" y="246" font-size="14" fill="#2c2c2c" font-weight="700">AT User Review</text>
  <text x="564" y="268" font-size="11.5" fill="#5b6472">Native assistive-technology</text>
  <text x="564" y="284" font-size="11.5" fill="#5b6472">users validate real-world</text>
  <text x="564" y="300" font-size="11.5" fill="#5b6472">usability, not just code.</text>

  <!-- ProcureEnsure / validation card -->
  <rect x="508" y="352" width="252" height="160" rx="12" fill="#f8f6f2" stroke="#d4a574" stroke-width="1.5"/>
  <text x="528" y="384" font-size="13" fill="#9a743f" font-weight="800" letter-spacing="0.5">VPAT VALIDATION</text>
  <text x="528" y="408" font-size="11.5" fill="#5b6472">Vet third-party vendor VPATs</text>
  <text x="528" y="424" font-size="11.5" fill="#5b6472">before you buy — know your</text>
  <text x="528" y="440" font-size="11.5" fill="#5b6472">risk before integrating.</text>
  <rect x="528" y="456" width="100" height="40" rx="8" fill="#eef7f1"/>
  <text x="578" y="476" font-size="15" fill="#2f9e6b" text-anchor="middle" font-weight="800">Low</text>
  <text x="578" y="490" font-size="9" fill="#5b6472" text-anchor="middle">risk rating</text>
  <rect x="640" y="456" width="100" height="40" rx="8" fill="#fdf8ee"/>
  <text x="690" y="476" font-size="15" fill="#b07e10" text-anchor="middle" font-weight="800">RFP</text>
  <text x="690" y="490" font-size="9" fill="#5b6472" text-anchor="middle">procurement ready</text>
</svg>
