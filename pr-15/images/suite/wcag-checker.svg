    <rect x="70" y="0" width="58" height="58" rx="8" fill="#3a3f47"/><text x="99" y="36" font-size="22" fill="#fff" text-anchor="middle" font-weight="800">14</text><text x="99" y="50" font-size="9" fill="#9aa0a8" text-anchor="middle">HRS</text>
    <rect x="140" y="0" width="58" height="58" rx="8" fill="#3a3f47"/><text x="169" y="36" font-size="22" fill="#d4a574" text-anchor="middle" font-weight="800">07</text><text x="169" y="50" font-size="9" fill="#9aa0a8" text-anchor="middle">MIN</text>
  </g>
  <text x="552" y="244" font-size="10.5" fill="#7d848d">DOJ Interim Final Rule · 2026</text>

  <!-- Side: device alt-text mini panel -->
  <rect x="530" y="296" width="230" height="240" rx="16" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="552" y="330" font-size="13" fill="#2c2c2c" font-weight="700">Issue detail</text>
  <rect x="552" y="346" width="186" height="92" rx="8" fill="#f4f0ea"/>
  <rect x="566" y="360" width="60" height="44" rx="4" fill="#d9c4a6"/>
  <path d="M566 404 l20 -22 l16 16 l10 -10 l10 16 z" fill="#b89a72"/>
  <circle cx="612" cy="372" r="6" fill="#cbb38d"/>
  <text x="638" y="372" font-size="10" fill="#5b6472">img.banner</text>
  <text x="638" y="388" font-size="10" fill="#d9534f" font-weight="600">missing alt</text>
  <rect x="552" y="450" width="186" height="30" rx="6" fill="#eef7f1" stroke="#2f9e6b"/>
  <text x="566" y="470" font-size="11" fill="#2f9e6b" font-weight="600">AI fix: "City hall at sunset"</text>
  <text x="552" y="510" font-size="10.5" fill="#9aa0a8">Free · No sign-up required</text>
