  <circle cx="324" cy="226" r="9" fill="#2f9e6b"/>
  <text x="342" y="232" font-size="22" fill="#2f9e6b" font-weight="800">LOW</text>

  <!-- Criteria checklist -->
  <g font-size="13" fill="#2c2c2c">
    <rect x="296" y="270" width="186" height="34" rx="8" fill="#f6f8f7"/>
    <circle cx="316" cy="287" r="8" fill="#2f9e6b"/><path d="M312 287 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="334" y="291">Color contrast</text>

    <rect x="296" y="310" width="186" height="34" rx="8" fill="#f6f8f7"/>
    <circle cx="316" cy="327" r="8" fill="#2f9e6b"/><path d="M312 327 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="334" y="331">Keyboard access</text>

    <rect x="296" y="350" width="186" height="34" rx="8" fill="#fdf3f2"/>
    <circle cx="316" cy="367" r="8" fill="#d9534f"/><path d="M313 364 l6 6 M319 364 l-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <text x="334" y="371">Alt text (4)</text>

    <rect x="296" y="390" width="186" height="34" rx="8" fill="#fdf8ee"/>
    <circle cx="316" cy="407" r="8" fill="#e0a82e"/><text x="316" y="411" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">!</text>
    <text x="334" y="411">Form labels (2)</text>
  </g>

  <!-- progress bar of 50+ criteria -->
  <text x="68" y="372" font-size="12" fill="#5b6472">52 of 64 WCAG criteria pass</text>
  <rect x="68" y="384" width="180" height="12" rx="6" fill="#eef0f3"/>
  <rect x="68" y="384" width="146" height="12" rx="6" fill="#2f9e6b"/>

  <rect x="68" y="448" width="180" height="40" rx="20" fill="#d4a574"/>
  <text x="158" y="473" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="0.5">START FREE SCAN</text>

  <!-- Side: deadline countdown card -->
  <rect x="530" y="36" width="230" height="240" rx="16" fill="#2c2c2c"/>
  <text x="552" y="74" font-size="12" fill="#d4a574" font-weight="700" letter-spacing="1">COMPLIANCE DEADLINE</text>
  <text x="552" y="108" font-size="15" fill="#ffffff" font-weight="600">April 26, 2027</text>
  <text x="552" y="128" font-size="11" fill="#9aa0a8">Large public entities</text>
  <g transform="translate(552,150)">
