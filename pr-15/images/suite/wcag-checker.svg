    <circle r="78" fill="none" stroke="#2f9e6b" stroke-width="18" stroke-linecap="round"
      stroke-dasharray="402 490" transform="rotate(-90)"/>
    <text x="0" y="2" font-size="40" fill="#2c2c2c" font-weight="800" text-anchor="middle">82%</text>
    <text x="0" y="26" font-size="12" fill="#5b6472" text-anchor="middle">conformance</text>
  </g>

  <!-- Risk badge -->
  <rect x="296" y="170" width="186" height="84" rx="12" fill="#eef7f1" stroke="#2f9e6b" stroke-width="1.5"/>
