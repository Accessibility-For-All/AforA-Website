<svg width="800" height="580" viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="wcBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f8f9fa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="580" fill="url(#wcBg)"/>

  <!-- Main report card -->
  <rect x="40" y="36" width="470" height="500" rx="16" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="68" y="78" font-size="13" fill="#d4a574" font-weight="700" letter-spacing="1">ADA TITLE II · WCAG 2.1 AA</text>
  <text x="68" y="104" font-size="20" fill="#2c2c2c" font-weight="800">Compliance Scan Report</text>
  <text x="68" y="126" font-size="12.5" fill="#9aa0a8">cityofpaxton.gov  ·  scanned just now</text>

  <!-- Score donut -->
